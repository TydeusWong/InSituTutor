<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学生步骤演示页</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <h1>教学步骤演示</h1>
        <p id="metaText" class="meta-text">正在加载数据...</p>
      </header>

      <section id="loadingState" class="card">
        <p>正在读取 structured_teaching_knowledge.json ...</p>
      </section>

      <section id="errorState" class="card hidden">
        <h2>加载失败</h2>
        <p id="errorText"></p>
        <p class="hint">
          建议在仓库根目录启动本地服务后再访问本页面，例如：
          <code>python -m http.server 8000</code>
        </p>
      </section>

      <section id="stepState" class="hidden">
        <div class="progress-line">
          <span id="progressText"></span>
        </div>

        <article class="card">
          <h2 id="stepTitle"></h2>
          <p id="timeRange" class="subtle"></p>

          <div class="block">
            <h3>步骤动作</h3>
            <ul id="actionsList"></ul>
          </div>

          <div class="block">
            <h3>观察要点</h3>
            <ul id="attentionList"></ul>
          </div>

          <div class="block">
            <h3>易错点与纠偏提示</h3>
            <ul id="mistakeList"></ul>
          </div>

          <div class="block">
            <h3>完成判定</h3>
            <p id="completionText"></p>
          </div>
        </article>

        <div class="actions">
          <button id="nextBtn" type="button">下一步</button>
        </div>
      </section>

      <section id="doneState" class="card hidden">
        <h2>已完成全部步骤</h2>
        <p>你已看完本次教学流程。</p>
        <button id="restartBtn" type="button">重新开始</button>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
